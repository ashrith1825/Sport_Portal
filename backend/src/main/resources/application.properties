# Application Configuration
spring.application.name=sport-portal

# Database Configuration (via Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# Server (Render assigns PORT dynamically)
server.port=${PORT:8080}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration-ms=86400000
# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://sport-portal-omega.vercel.app}